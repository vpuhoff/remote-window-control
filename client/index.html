<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Share App Remote</title>
  </head>
  <body>
    <div id="app">
      <video
        id="remote-video"
        autoplay
        playsinline
        muted
        disablepictureinpicture
      ></video>
      <div id="status-pill">Подключение...</div>
      <button id="keyboard-button" type="button" aria-label="Открыть клавиатуру">
        ⌨
      </button>
      <textarea
        id="hidden-text-input"
        inputmode="text"
        enterkeyhint="done"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Печатайте здесь"
      ></textarea>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Share App Remote</title>
  </head>
  <body>
    <div id="app">
      <div id="top-bar">
        <div id="status-pill">Подключение...</div>
        <div id="top-bar-actions">
          <button id="fullscreen-button" type="button" aria-label="Полный экран">⛶</button>
          <button id="keyboard-button" type="button" aria-label="Открыть клавиатуру">⌨</button>
        </div>
      </div>
      <div id="video-stage">
        <video
          id="remote-video"
          autoplay
          playsinline
          muted
          disablepictureinpicture
        ></video>
      </div>
      <div id="input-dock">
        <textarea
          id="hidden-text-input"
          inputmode="text"
          enterkeyhint="done"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="Напишите текст"
        ></textarea>
        <button id="backspace-button" type="button" aria-label="Backspace">⌫</button>
        <button id="enter-button" type="button" aria-label="Enter">↵</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

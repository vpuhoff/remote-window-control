name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: self-hosted #windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build

      # - name: Set up .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: "6.0.x"

      # - name: Install Windows 10 SDK (19041)
      #   uses: GuillaumeFalourd/setup-windows10-sdk-action@v1
      #   with:
      #     sdk-version: "19041"

      - name: Build native capture
        run: dotnet build native-capture/tests/CaptureProbe/CaptureProbe.csproj -c Release

      # - name: Set up Go
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version: "1.24"

      - name: Build host
        run: |
          cd host
          go build -o share-host.exe ./cmd/share-host

      - name: Create distro
        run: |
          $version = "${{ github.run_number }}-${{ github.sha }}"
          $dist = "dist/share-app-$version"
          New-Item -ItemType Directory -Force -Path "$dist/host" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist/client/dist" | Out-Null
          $probeDir = "$dist/native-capture/tests/CaptureProbe/bin/Release/net6.0-windows10.0.19041.0"
          New-Item -ItemType Directory -Force -Path $probeDir | Out-Null
          Copy-Item host/share-host.exe $dist/host/
          Copy-Item -Recurse client/dist/* $dist/client/dist/
          Copy-Item -Recurse native-capture/tests/CaptureProbe/bin/Release/net6.0-windows10.0.19041.0/* $probeDir/
          Compress-Archive -Path "$dist/*" -DestinationPath "dist/share-app-$version.zip"
          Get-ChildItem dist/

      - name: Upload distro
        uses: actions/upload-artifact@v4
        with:
          name: share-app-windows
          path: dist/*.zip
